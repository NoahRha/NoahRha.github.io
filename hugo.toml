baseURL = 'https://noahrha.github.io/'
languageCode = 'ko'
defaultContentLanguage = 'ko'
title = "MyXCloud Blog"
theme = 'PaperMod'
summaryLength = 30
disablePathToLower = true

enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  env = 'production'
  author = 'Noah'
  description = 'OpenClaw, IT 보안, LLM 소식을 정리하는 MyXCloud 블로그'
  keywords = ['OpenClaw', 'IT 보안', 'LLM', 'AI', '에이전트', '자동화', '기술블로그']
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  ShowAllPagesInArchive = true
  mainSections = ['openclaw', 'IT-security', 'LLM-info']

  [params.profileMode]
    enabled = false
    title = "MyXCloud Blog"
    subtitle = "OpenClaw, IT 보안, LLM 소식을 정리합니다"
    imageUrl = '/images/profile-placeholder.png'
    imageTitle = 'Noah Blog'
    imageWidth = 140
    imageHeight = 140

    [[params.profileMode.buttons]]
      name = 'OpenClaw 글 보기'
      url = '/openclaw/'
    [[params.profileMode.buttons]]
      name = '아카이브'
      url = '/archives/'
    [[params.profileMode.buttons]]
      name = '태그'
      url = '/tags/'

  [params.homeInfoParams]
    Title = 'MyXCloud Blog'
    Content = 'OpenClaw, IT 보안, LLM 소식을 카테고리별로 정리합니다.'

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    limit = 10
    keys = ['title', 'permalink', 'summary', 'content']

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '홈'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'openclaw'
    name = 'OpenClaw'
    url = '/openclaw/'
    weight = 20
  [[menu.main]]
    identifier = 'it-security'
    name = 'IT 보안'
    url = '/IT-security/'
    weight = 30
  [[menu.main]]
    identifier = 'llm-info'
    name = 'LLM 소식'
    url = '/LLM-info/'
    weight = 40
  [[menu.main]]
    identifier = 'archives'
    name = '아카이브'
    url = '/archives/'
    weight = 50
  [[menu.main]]
    identifier = 'search'
    name = '검색'
    url = '/search/'
    weight = 60
  [[menu.main]]
    identifier = 'tags'
    name = '태그'
    url = '/tags/'
    weight = 70
  [[menu.main]]
    identifier = 'about'
    name = '소개'
    url = '/about/'
    weight = 80
